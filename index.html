<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SGX - Infinite Borikua ARchiVR (Pure VR)</title>
    <style>
        :root {
            --sgx-yellow: #FDCC0D;
            --sgx-blue: #32527B;
            --sgx-bg: #050505;
            --glass: rgba(20, 20, 20, 0.75);
        }

        body { 
            margin: 0; 
            overflow: hidden; 
            background: var(--sgx-bg);
            font-family: 'Courier New', Courier, monospace;
            color: var(--sgx-yellow);
        }

        canvas { 
            display: block; 
            position: absolute;
            top: 0; left: 0; z-index: 1;
        }
        
        #ui-layer {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 50;
            transition: opacity 0.6s ease, visibility 0.6s;
        }

        .sgx-panel {
            background: var(--glass);
            border: 1px solid var(--sgx-blue);
            border-top: 4px solid var(--sgx-yellow);
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            width: 450px;
            max-width: 90%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9), 0 0 20px rgba(50, 82, 123, 0.4);
        }

        .sgx-panel h1 {
            margin: 0 0 10px 0;
            font-size: 2rem;
            letter-spacing: 4px;
            font-weight: 900;
            color: #fff;
        }

        /* Estilos inyectados al botón nativo de WebXR */
        button.sgx-btn {
            background: var(--sgx-yellow) !important; color: #000 !important;
            border: none !important; padding: 18px !important; font-size: 1rem !important;
            font-weight: 900 !important; font-family: inherit !important; cursor: pointer !important;
            border-radius: 4px !important; text-transform: uppercase !important;
            width: 100% !important; margin-top: 12px !important; transition: all 0.2s !important;
            position: relative !important; left: auto !important; bottom: auto !important;
            opacity: 1 !important; height: auto !important;
        }
        button.sgx-btn:hover { background: #fff !important; transform: translateY(-2px) !important; }

    </style>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.147.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>

    <div id="scene-container"></div>

    <div id="ui-layer">
        <div class="sgx-panel" id="main-panel">
            <h1>INFINITE BORIKUA</h1>
            <p style="color: #888; margin-bottom: 30px; font-size: 0.85rem;">
                EXPERIENCIA VR INMERSIVA<br>
                <span style="color: var(--sgx-blue);">SGX.Showcase Architecture</span>
            </p>
            </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { VRButton } from 'three/addons/webxr/VRButton.js';
        import { XRControllerModelFactory } from 'three/addons/webxr/XRControllerModelFactory.js';

        // --- SISTEMA CORE ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020202, 0.018);
        
        // Contenedor de movilidad VR (Locomoción)
        const cameraGroup = new THREE.Group();
        scene.add(cameraGroup);
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        cameraGroup.add(camera);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.outputEncoding = THREE.sRGBEncoding;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.xr.enabled = true;
        document.getElementById('scene-container').appendChild(renderer.domElement);

        // --- HACK DEL UI: Botón nativo de WebXR con esteroides CSS ---
        const vrBtn = VRButton.createButton(renderer);
        vrBtn.classList.add('sgx-btn');
        vrBtn.innerText = "ENTRAR A VR AHORA";
        document.getElementById('main-panel').appendChild(vrBtn);

        // Ocultar UI HTML al entrar a VR
        renderer.xr.addEventListener('sessionstart', () => {
            document.getElementById('ui-layer').style.display = 'none';
        });
        renderer.xr.addEventListener('sessionend', () => {
            document.getElementById('ui-layer').style.display = 'flex';
        });

        const amb = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(amb);
        const spot = new THREE.SpotLight(0xffffff, 1.5);
        spot.position.set(0, 10, 5);
        spot.angle = Math.PI / 3;
        scene.add(spot);

        // --- ARQUITECTURA DE INTERACCIÓN (Raycaster & Física) ---
        const interactableObjects = [];
        let raycaster = new THREE.Raycaster();
        let tempMatrix = new THREE.Matrix4();
        
        const laserGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 0, -1)]);
        const laserMat = new THREE.LineBasicMaterial({ color: 0xFDCC0D, transparent: true, opacity: 0.6 });

        // Controladores (Manos Virtuales)
        const controllerModelFactory = new XRControllerModelFactory();
        const controllers = [];

        for(let i = 0; i < 2; i++) {
            const controller = renderer.xr.getController(i);
            controller.addEventListener('selectstart', onSelectStart);
            scene.add(controller);
            cameraGroup.add(controller); // Anclado al grupo de movimiento

            const controllerGrip = renderer.xr.getControllerGrip(i);
            controllerGrip.add(controllerModelFactory.createControllerModel(controllerGrip));
            cameraGroup.add(controllerGrip);

            const laser = new THREE.Line(laserGeo, laserMat.clone());
            laser.name = 'line';
            laser.scale.z = 5; // Largo inicial del láser
            controller.add(laser);
            controllers.push(controller);
        }

        // --- OBJETO 3D INTERACTIVO (PRUEBA TÉCNICA) ---
        const artifactGeo = new THREE.IcosahedronGeometry(0.8, 1);
        const artifactMat = new THREE.MeshStandardMaterial({ color: 0x32527B, wireframe: true, emissive: 0x111111 });
        const interactiveArtifact = new THREE.Mesh(artifactGeo, artifactMat);
        interactiveArtifact.position.set(0, 1.5, -3); // En el centro, frente al usuario
        scene.add(interactiveArtifact);
        interactableObjects.push(interactiveArtifact);

        // --- LÓGICA DE INTERACCIÓN ---
        function getIntersections(controller) {
            tempMatrix.identity().extractRotation(controller.matrixWorld);
            raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
            raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);
            return raycaster.intersectObjects(interactableObjects, false);
        }

        function onSelectStart(event) {
            const controller = event.target;
            const intersections = getIntersections(controller);

            if (intersections.length > 0) {
                const object = intersections[0].object;
                
                // Efecto visual al gatillar
                if(object === interactiveArtifact) {
                    object.material.color.setHex(Math.random() * 0xffffff);
                    object.scale.multiplyScalar(1.1);
                    setTimeout(() => object.scale.set(1,1,1), 150);
                }

                // Inyección de Pulso Háptico (Dopamina Táctil)
                const session = renderer.xr.getSession();
                if (session && event.data && event.data.gamepad) {
                    const hapticActuator = event.data.gamepad.hapticActuators?.[0];
                    if (hapticActuator) {
                        hapticActuator.pulse(1.0, 100); // Máxima fuerza, 100ms
                    }
                }
            }
        }

        function updateRaycasters() {
            controllers.forEach(controller => {
                const line = controller.getObjectByName('line');
                const intersections = getIntersections(controller);
                if (intersections.length > 0) {
                    line.scale.z = intersections[0].distance; // Acorta el láser hasta el impacto
                } else {
                    line.scale.z = 5;
                }
            });
        }

        // --- GALERÍA PARAMÉTRICA ---
        let roomGroup = new THREE.Group();
        scene.add(roomGroup);

        const config = { w: 26, h: 16, d: 26, wallTex: 'https://static.wixstatic.com/media/fe81a7_07aecfdb3b044909b0b267dfe7eecd96~mv2.png' };
        
        function initGallery() {
            const tex = new THREE.TextureLoader().load(config.wallTex);
            tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
            tex.encoding = THREE.sRGBEncoding;

            const roomGeo = new THREE.BoxGeometry(config.w, config.h, config.d);
            const wallMat = (repeatU, repeatV) => {
                const t = tex.clone(); t.repeat.set(-repeatU * 0.15, repeatV * 0.15); t.needsUpdate = true;
                return new THREE.MeshStandardMaterial({ map: t, side: THREE.BackSide, roughness: 0.9, color: 0x555555 });
            };
            
            const matX = wallMat(config.d, config.h);
            const matY = wallMat(config.w, config.d);
            const matZ = wallMat(config.w, config.h);
            const roomMesh = new THREE.Mesh(roomGeo, [matX, matX, matY, matY, matZ, matZ]);
            roomGroup.add(roomMesh);

            const gridB = new THREE.GridHelper(Math.max(config.w, config.d), 25, 0x32527B, 0x111111);
            gridB.position.y = -config.h / 2 + 0.05;
            roomGroup.add(gridB);

            buildFrames();
        }

        function buildFrames() {
            const frameUrls = [
                'https://static.wixstatic.com/media/fe81a7_b39d8b1fd26b4cf49a7636a787d5753e~mv2.png', 'https://static.wixstatic.com/media/fe81a7_8e633cf8bcb3446d9b4cbe133dfcbce1~mv2.png',
                'https://static.wixstatic.com/media/fe81a7_92284537ab6d4d85b7f0143599e927a8~mv2.png', 'https://static.wixstatic.com/media/fe81a7_50a00e8777db48eaa8ccac45f762a408~mv2.png',
                'https://static.wixstatic.com/media/fe81a7_57282853d2e74770ba081e88b6fe01fa~mv2.png', 'https://static.wixstatic.com/media/fe81a7_a5474248be1d408eb59d4a90872ecd2a~mv2.png',
                'https://static.wixstatic.com/media/fe81a7_c2420b5aecb246ad9d3af8266aeebfd5~mv2.png', 'https://static.wixstatic.com/media/fe81a7_805b74a1b73d47fa83c446130585cd72~mv2.png',
                'https://static.wixstatic.com/media/fe81a7_543abb3e04aa4488928129ccae33875a~mv2.png', 'https://static.wixstatic.com/media/fe81a7_cb6714af21974fe689652004d260cbc8~mv2.png',
                'https://static.wixstatic.com/media/fe81a7_a0b0590dc0844d1b88d21763d52696c7~mv2.png', 'https://static.wixstatic.com/media/fe81a7_76f32d6280db4b508bec103ffd07bcd4~mv2.png',
                'https://static.wixstatic.com/media/fe81a7_3640b51d386445ffa6f393c73785d8af~mv2.png', 'https://static.wixstatic.com/media/fe81a7_737e849b909c468998928172fa1ea821~mv2.png'
            ];

            const configs = [
                { px: 0, py: 0, pz: -config.d/2 + 0.1, r: 0 },
                { px: -config.w/2 + 0.1, py: config.h/5, pz: -config.d/3.2, r: Math.PI/2 }, { px: -config.w/2 + 0.1, py: config.h/5, pz: 0, r: Math.PI/2 }, { px: -config.w/2 + 0.1, py: config.h/5, pz: config.d/3.2, r: Math.PI/2 },
                { px: -config.w/2 + 0.1, py: -config.h/5, pz: -config.d/3.2, r: Math.PI/2 }, { px: -config.w/2 + 0.1, py: -config.h/5, pz: 0, r: Math.PI/2 }, { px: -config.w/2 + 0.1, py: -config.h/5, pz: config.d/3.2, r: Math.PI/2 },
                { px: config.w/2 - 0.1, py: config.h/5, pz: -config.d/3.2, r: -Math.PI/2 }, { px: config.w/2 - 0.1, py: config.h/5, pz: 0, r: -Math.PI/2 }, { px: config.w/2 - 0.1, py: config.h/5, pz: config.d/3.2, r: -Math.PI/2 },
                { px: config.w/2 - 0.1, py: -config.h/5, pz: -config.d/3.2, r: -Math.PI/2 }, { px: config.w/2 - 0.1, py: -config.h/5, pz: 0, r: -Math.PI/2 }, { px: config.w/2 - 0.1, py: -config.h/5, pz: config.d/3.2, r: -Math.PI/2 },
                { px: 0, py: 0, pz: config.d/2 - 0.1, r: Math.PI }
            ];

            const tl = new THREE.TextureLoader();
            frameUrls.forEach((url, i) => {
                const h = (i === 0 || i === 13) ? 8 : 4.2;
                const group = new THREE.Group();
                const border = new THREE.Mesh(new THREE.BoxGeometry(h+0.4, h+0.4, 0.2), new THREE.MeshBasicMaterial({ color: 0xFDCC0D }));
                const canvas = new THREE.Mesh(new THREE.PlaneGeometry(h, h), new THREE.MeshBasicMaterial({ color: 0x222222 }));
                border.position.z = -0.15;
                group.add(border); group.add(canvas);
                
                group.position.set(configs[i].px, configs[i].py, configs[i].pz);
                group.rotation.y = configs[i].r;
                scene.add(group);
                
                // Hacer el cuadro interactuable
                interactableObjects.push(canvas);

                tl.load(url, tex => {
                    tex.encoding = THREE.sRGBEncoding;
                    const aspect = tex.image.width / tex.image.height;
                    canvas.geometry.dispose(); canvas.geometry = new THREE.PlaneGeometry(h * aspect, h);
                    border.geometry.dispose(); border.geometry = new THREE.BoxGeometry((h * aspect)+0.4, h+0.4, 0.2);
                    canvas.material.map = tex; canvas.material.color.setHex(0xffffff); canvas.material.needsUpdate = true;
                });
            });
        }

        initGallery();

        // --- SISTEMA DE LOCOMOCIÓN (JOYSTICKS) ---
        const moveSpeed = 0.08;
        const turnSpeed = 0.04;

        function handleLocomotion() {
            const session = renderer.xr.getSession();
            if (!session) return;

            for (const source of session.inputSources) {
                if (!source.gamepad) continue;

                const axes = source.gamepad.axes;
                // axes[2] es X (Izquierda/Derecha), axes[3] es Y (Adelante/Atrás) del joystick

                if (source.handedness === 'left') {
                    // Moverse (Locomotion Smooth)
                    const xAxis = axes[2];
                    const yAxis = axes[3];

                    // Calcular el vector de dirección basado en adónde está mirando el usuario
                    const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                    forward.y = 0; forward.normalize(); // Ignorar Y para no volar al mirar arriba
                    
                    const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                    right.y = 0; right.normalize();

                    // Aplicar vectores al CameraGroup
                    if (Math.abs(yAxis) > 0.1) cameraGroup.position.add(forward.multiplyScalar(-yAxis * moveSpeed));
                    if (Math.abs(xAxis) > 0.1) cameraGroup.position.add(right.multiplyScalar(xAxis * moveSpeed));
                }

                if (source.handedness === 'right') {
                    // Rotar (Smooth Turn)
                    const xAxis = axes[2];
                    if (Math.abs(xAxis) > 0.1) {
                        cameraGroup.rotation.y -= xAxis * turnSpeed;
                    }
                }
            }
        }

        // --- RENDER LOOP MAESTRO ---
        renderer.setAnimationLoop(() => {
            // Animación ambiental del artefacto
            interactiveArtifact.rotation.x += 0.005;
            interactiveArtifact.rotation.y += 0.01;

            if (renderer.xr.isPresenting) {
                handleLocomotion();
                updateRaycasters();
            }

            renderer.render(scene, camera);
        });
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
